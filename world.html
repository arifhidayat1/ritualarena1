<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ritual Arena — World</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Press Start 2P',monospace; }

#world-container {
  position:relative; width:100vw; height:100vh; overflow:hidden;
}

/* World map layers */
#world-map {
  position:absolute; top:0; left:0;
  width:1920px; height:1080px;
  image-rendering:pixelated;
}
#world-map img {
  position:absolute; top:0; left:0;
  width:1920px; height:1080px;
  image-rendering:pixelated;
}

/* Character */
#character {
  position:absolute;
  width:64px; height:64px;
  image-rendering:pixelated;
  z-index:100;
  transform:translate(-50%,-50%);
  transition:none;
}

/* Enter prompt */
#enter-prompt {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-120px);
  background:rgba(0,0,0,0.85);
  border:2px solid #f0c040;
  color:#f0c040;
  padding:8px 16px;
  font-size:8px;
  letter-spacing:1px;
  display:none;
  z-index:200;
  animation:promptPulse 1s ease-in-out infinite alternate;
  white-space:nowrap;
}
@keyframes promptPulse {
  from { box-shadow:0 0 8px rgba(240,192,64,0.4); }
  to   { box-shadow:0 0 20px rgba(240,192,64,0.8); }
}

/* HUD */
#hud {
  position:fixed; top:0; left:0; right:0; z-index:300;
  background:rgba(0,0,0,0.75);
  border-bottom:1px solid rgba(240,192,64,0.3);
  padding:6px 14px;
  display:flex; align-items:center; gap:10px;
  font-size:7px; color:#f0c040;
}
#hud-title { letter-spacing:2px; }
#hud-pos { margin-left:auto; color:#4040a0; font-family:monospace; font-size:9px; }

/* Mobile joystick */
#joystick-zone {
  position:fixed; bottom:30px; left:30px;
  width:120px; height:120px;
  z-index:400;
  display:none;
}
#joystick-base {
  width:120px; height:120px;
  border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.3);
  position:absolute;
}
#joystick-stick {
  width:50px; height:50px;
  border-radius:50%;
  background:rgba(240,192,64,0.7);
  border:2px solid rgba(240,192,64,0.9);
  position:absolute;
  top:35px; left:35px;
  transition:none;
}

/* E button for mobile */
#btn-enter {
  position:fixed; bottom:30px; right:30px;
  width:70px; height:70px;
  border-radius:50%;
  background:rgba(240,192,64,0.2);
  border:2px solid rgba(240,192,64,0.6);
  color:#f0c040;
  font-size:10px;
  display:none;
  z-index:400;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:2px;
  cursor:pointer;
  font-family:'Press Start 2P',monospace;
}

/* Debug collision boxes (toggle with D) */
.debug-box {
  position:absolute;
  border:1px solid rgba(255,0,0,0.5);
  background:rgba(255,0,0,0.1);
  pointer-events:none;
  display:none;
}
.debug-trigger {
  position:absolute;
  border:1px solid rgba(0,255,0,0.5);
  background:rgba(0,255,0,0.1);
  pointer-events:none;
  display:none;
}

/* Transition overlay */
#transition-overlay {
  position:fixed; inset:0;
  background:#000;
  opacity:0;
  pointer-events:none;
  z-index:500;
  transition:opacity 0.4s;
}

@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  e.preventDefault();
});
window.addEventListener('keyup',  e => { keys[e.key] = false; });

const jBase  = document.getElementById('joystick-base');
const jStick = document.getElementById('joystick-stick');
const jZone  = document.getElementById('joystick-zone');

function isMobile(){ return window.innerWidth <= 900 || 'ontouchstart' in window; }

function setupJoystick(){
  if(!isMobile()) return;
  jZone.style.display = 'block';
  document.getElementById('btn-enter').style.display = 'flex';

  let startX, startY;
  const R = 35; // max stick travel

  jZone.addEventListener('touchstart', e => {
    const t = e.touches[0];
    const rect = jZone.getBoundingClientRect();
    startX = rect.left + 60;
    startY = rect.top  + 60;
    joystick.active = true;
    e.preventDefault();
  }, {passive:false});

  jZone.addEventListener('touchmove', e => {
    if(!joystick.active) return;
    const t = e.touches[0];
    let dx = t.clientX - startX;
    let dy = t.clientY - startY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist > R){ dx = dx/dist*R; dy = dy/dist*R; }
    joystick.dx = dx/R;
    joystick.dy = dy/R;
    jStick.style.left = (35 + dx) + 'px';
    jStick.style.top  = (35 + dy) + 'px';
    e.preventDefault();
  }, {passive:false});

  const endJoy = () => {
    joystick.active = false;
    joystick.dx = 0; joystick.dy = 0;
    jStick.style.left = '35px'; jStick.style.top = '35px';
  };
  jZone.addEventListener('touchend',    endJoy);
  jZone.addEventListener('touchcancel', endJoy);
}

  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function canMove(nx, ny){
  const hw = CHAR_SIZE/2;
  for(const c of COLLIDERS){
    if(rectOverlap(nx-hw, ny-hw, CHAR_SIZE, CHAR_SIZE, c.x, c.y, c.w, c.h))
      return false;
  }
  return true;
}

SPRITES.right = SPRITES.left; // will be flipped

function drawSprite(dir, frame, flip){
  ctx.clearRect(0,0,64,64);
  const rows = SPRITES[dir][frame].split('|');
  const scale = 4;
  ctx.save();
  if(flip){ ctx.scale(-1,1); ctx.translate(-64,0); }
  rows.forEach((row,y)=>{
    row.split(',').forEach((k,x)=>{
      const color = PC[k.trim()];
      if(color){ ctx.fillStyle=color; ctx.fillRect(x*scale,y*scale,scale,scale); }
    });
  });
  ctx.restore();
}

// ============================================================
// CAMERA
// ============================================================
const map = document.getElementById('world-map');
const vw = window.innerWidth ⠵⠺⠵⠵⠟⠞⠟⠟⠞⠞⠞⠵⠟⠞⠺⠵⠺⠞⠞⠞⠟⠞⠺⠞⠟⠵⠞⠞⠟⠺⠟ 1080;

function updateCamera(){
  // Center camera on character, clamp to world bounds
  let camX = charX - vw/2;
  let camY = charY - vh/2;
  camX = Math.max(0, Math.min(Math.max(0, WORLD_W - vw), camX));
  camY = Math.max(0, Math.min(Math.max(0, WORLD_H - vh), camY));
  map.style.transform = `translate(${-camX}px,${-camY}px)`;
  // Character stays fixed on screen at center
  charCanvas.style.left = (vw/2) + 'px';
  charCanvas.style.top  = (vh/2) + 'px';
}

// ============================================================
// TRIGGER CHECK
// ============================================================
function checkTriggers(){
  const hw = CHAR_SIZE/2;
  activeTrigger = null;
  for(const t of TRIGGERS){
    if(rectOverlap(charX-hw,charY-hw,CHAR_SIZE,CHAR_SIZE, t.x,t.y,t.w,t.h)){
      activeTrigger = t;
      break;
    }
  }
  const prompt = document.getElementById('enter-prompt');
  const btnE   = document.getElementById('btn-enter');
  if(activeTrigger){
    prompt.textContent = `▶ Press E to Enter ${activeTrigger.name}`;
    prompt.style.display = 'block';
    document.getElementById('hud-building').textContent = activeTrigger.name;
    if(isMobile()) btnE.style.display='flex';
  } else {
    prompt.style.display = 'none';
    document.getElementById('hud-building').textContent = '';
    if(isMobile()) btnE.style.display='none';
  }
}

// ============================================================
// ENTER BUILDING
// ============================================================
function triggerEnter(){
  if(!activeTrigger) return;
  const overlay = document.getElementById('transition-overlay');
  overlay.style.opacity = '1';
  overlay.style.pointerEvents = 'all';
  setTimeout(()=>{
    activeTrigger.action();
  }, 400);
}

function enterBuilding(mode){
  // Save world state
  sessionStorage.setItem('worldX', charX);
  sessionStorage.setItem('worldY', charY);
  // Go to game
  if(mode === 'classic'){
    window.location.href = 'index.html#classic';
  } else if(mode === 'event'){
    window.location.href = 'index.html#event';
  }
}

// ============================================================
// DEBUG
// ============================================================
function toggleDebug(){
  debugMode = !debugMode;
  document.querySelectorAll('.debug-box,.debug-trigger').forEach(el=>{
    el.style.display = debugMode ? 'block' : 'none';
  });
}

// ============================================================
// GAME LOOP
// ============================================================
function update(){
  let dx = 0, dy = 0;
  // debug
  document.getElementById('hud-pos').textContent = x:${Math.floor(charX)} y:${Math.floor(charY)} | cam:${Math.floor(charX-vw/2)},${Math.floor(charY-vh/2)};

  // Keyboard
  if(keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
  if(keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if(keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
  if(keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;

  // Joystick
  if(joystick.active){
    dx += joystick.dx;
    dy += joystick.dy;
  }

  // Normalize diagonal
  if(dx !== 0 && dy !== 0){ dx *= 0.707; dy *= 0.707; }

  isMoving = (dx !== 0 || dy !== 0);

  // Update facing
  if(Math.abs(dx) > Math.abs(dy)){
    facing = dx > 0 ? 'right' : 'left';
  } else if(dy !== 0){
    facing = dy > 0 ? 'down' : 'up';
  }

  // Move with collision
  const nx = charX + dx * CHAR_SPEED;
  const ny = charY + dy * CHAR_SPEED;

  if(canMove(nx, charY)) charX = nx;
  if(canMove(charX, ny)) charY = ny;

  // Animate
  if(isMoving){
    animTick++;
    if(animTick >= ANIM_SPEED){ animTick=0; animFrame=(animFrame+1)%4; }
  } else {
    animFrame = 0; animTick = 0;
  }

  // Draw
  const dir   = facing === 'right' ? 'left' : facing;
  const flip  = facing === 'right';
  drawSprite(dir, animFrame, flip);

  // Camera
  updateCamera();

  // Triggers
  checkTriggers();

  // HUD pos (debug)
  document.getElementById('hud-pos').textContent = `${Math.floor(charX)},${Math.floor(charY)}`;
}

// ============================================================
// INIT
// ============================================================
function init(){
  // Restore position if coming back from game
  const sx = sessionStorage.getItem('worldX');
  const sy = sessionStorage.getItem('worldY');
  if(sx && sy){ charX = parseFloat(sx); charY = parseFloat(sy); }

  setupJoystick();
  drawSprite('down', 0, false);
  updateCamera();

  setInterval(update, 1000/60);
}

window.addEventListener('load', init);
