<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ritual Arena — World</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Press Start 2P',monospace; }
#hud {
  position:fixed; top:0; left:0; right:0; z-index:999;
  background:rgba(0,0,0,0.7);
  border-bottom:1px solid #f0c040;
  padding:6px 14px;
  display:flex; align-items:center; gap:10px;
  font-size:7px; color:#f0c040;
}
#debug-info { margin-left:auto; color:#40d0ff; font-family:monospace; font-size:10px; }
#enter-prompt {
  position:fixed; bottom:100px; left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.9);
  border:2px solid #f0c040;
  color:#f0c040; padding:10px 20px;
  font-size:9px; display:none; z-index:999;
  white-space:nowrap;
  animation:pulse 1s ease-in-out infinite alternate;
}
@keyframes pulse {
  from { box-shadow: 0 0 8px rgba(240,192,64,0.4); }
  to   { box-shadow: 0 0 20px rgba(240,192,64,0.9); }
}
#joystick-zone {
  position:fixed; bottom:30px; left:30px;
  width:120px; height:120px; z-index:999; display:none;
}
#joystick-base {
  width:120px; height:120px; border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.3);
  position:absolute;
}
#joystick-stick {
  width:50px; height:50px; border-radius:50%;
  background:rgba(240,192,64,0.7);
  border:2px solid #f0c040;
  position:absolute; top:35px; left:35px;
}
#btn-enter {
  position:fixed; bottom:30px; right:30px;
  width:70px; height:70px; border-radius:50%;
  background:rgba(240,192,64,0.2);
  border:2px solid rgba(240,192,64,0.6);
  color:#f0c040; font-size:10px;
  display:none; z-index:999;
  align-items:center; justify-content:center;
  flex-direction:column; cursor:pointer;
  font-family:'Press Start 2P',monospace;
}
</style>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
<div id="hud">
  <span>RITUAL ARENA</span>
  <span style="color:#4040a0;font-size:7px">WORLD MAP</span>
  <span id="building-name" style="color:#80ff80;font-size:7px;margin-left:10px"></span>
  <span id="debug-info" style="margin-left:auto;color:#40d0ff;font-family:monospace;font-size:10px"></span>
</div>
<div id="enter-prompt">Press E to Enter</div>
<canvas id="canvas"></canvas>
<div id="joystick-zone">
  <div id="joystick-base"></div>
  <div id="joystick-stick"></div>
</div>
<div id="btn-enter" onclick="tryEnter()">
  <span style="font-size:14px">E</span>
  <span style="font-size:6px">ENTER</span>
</div>

<script>
// ── Canvas setup ──────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── World size ────────────────────────────────────────────
const WW = 1920;
const WH = 1080;

// ── Load images ───────────────────────────────────────────
const imgs = {};
[
  ['char_walk',        'assets/black_ritualist_walk.png'],
  ['wallet_icon',      'assets/wallet_icon.png'],
  ['char_idle',        'assets/black_ritualist_idle.png'],
  ['ground',          'assets/ground.png'],
  ['jalan',           'assets/jalan.png'],
  ['danau',           'assets/danau.png'],
  ['batu',            'assets/batu.png'],
  ['pohon',           'assets/pohon.png'],
  ['shadow_dungeon',  'assets/bayangan_dungeon.png'],
  ['shadow_training', 'assets/bayangan_training.png'],
  ['shadow_pvp',      'assets/bayangan_pvp.png'],
  ['dungeon',         'assets/dungeon.png'],
  ['training',        'assets/training.png'],
  ['pvp',             'assets/pvp.png'],
].forEach(([k, src]) => {
  const img = new Image();
  img.src = src;
  imgs[k] = img;
});

// ── Character (world coordinates) ────────────────────────
let wx = 760;   // world X
let wy = 540;   // world Y
const SPEED = 4;
let facing    = 'down';
let isMoving  = false;
let animFrame = 0;
let animTick  = 0;
const ANIM_SPEED = 6;

// ── Camera ────────────────────────────────────────────────
// Camera offset: how many world pixels are off-screen to the left/top
let camX = 0;
let camY = 0;

function updateCamera() {
  // Center camera on character
  camX = wx - canvas.width  / 2;
  camY = wy - canvas.height / 2;
  // Clamp so we don't show outside world
  camX = Math.max(0, Math.min(WW - canvas.width,  camX));
  camY = Math.max(0, Math.min(WH - canvas.height, camY));
}

// ── Input ─────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key.toLowerCase() === 'e') tryEnter();
  if (e.key === '1') { debugMode = !debugMode; }
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
});

// ── Joystick ──────────────────────────────────────────────
const joy = { dx: 0, dy: 0 };

function setupJoystick() {
  if (!('ontouchstart' in window)) return;
  document.getElementById('joystick-zone').style.display = 'block';
  document.getElementById('btn-enter').style.display     = 'flex';

  const zone  = document.getElementById('joystick-zone');
  const stick = document.getElementById('joystick-stick');
  let sx = 0, sy = 0;

  zone.addEventListener('touchstart', e => {
    const r = zone.getBoundingClientRect();
    sx = r.left + 60;
    sy = r.top  + 60;
    e.preventDefault();
  }, { passive: false });

  zone.addEventListener('touchmove', e => {
    const t  = e.touches[0];
    let dx   = t.clientX - sx;
    let dy   = t.clientY - sy;
    const d  = Math.sqrt(dx * dx + dy * dy);
    if (d > 35) { dx = dx / d * 35; dy = dy / d * 35; }
    joy.dx = dx / 35;
    joy.dy = dy / 35;
    stick.style.left = (35 + dx) + 'px';
    stick.style.top  = (35 + dy) + 'px';
    e.preventDefault();
  }, { passive: false });

  const end = () => {
    joy.dx = 0; joy.dy = 0;
    stick.style.left = '35px';
    stick.style.top  = '35px';
  };
  zone.addEventListener('touchend',    end);
  zone.addEventListener('touchcancel', end);
}

// ── Collision (world space) ───────────────────────────────
const COLLIDERS = [
  // Dungeon (setengah lingkaran - 3 rect)
  { x:363,  y:14,  w:1024, h:80  },
  { x:463,  y:94,  w:824,  h:80  },
  { x:563,  y:174, w:624,  h:56  },
  // Training camp
  { x:684,  y:810, w:474,  h:255 },
  // PvP Arena
  { x:1510, y:17,  w:393,  h:337 },
  // Danau
  { x:1497, y:698, w:355,  h:365 },
  // World boundaries
  { x:-50,  y:0,   w:50,   h:WH  },
  { x:WW,   y:0,   w:50,   h:WH  },
  { x:0,    y:-50, w:WW,   h:50  },
  { x:0,    y:WH,  w:WW,   h:50  },
];

function overlaps(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx &&
         ay < by + bh && ay + ah > by;
}

function canMove(nx, ny) {
  const hs = 14; // half-size of char hitbox
  for (const c of COLLIDERS) {
    if (overlaps(nx - hs, ny - hs, hs * 2, hs * 2,
                 c.x, c.y, c.w, c.h)) return false;
  }
  return true;
}

// ── Trigger zones (world space) ───────────────────────────
// Koordinat berdasarkan posisi karakter saat di depan pintu
const TRIGGERS = [
  { id: 'dungeon',  name: 'DUNGEON',       wx: 912, wy: 315, r: 80, mode: 'classic' },
  { id: 'training', name: 'TRAINING CAMP', wx: 912, wy: 655, r: 80, mode: 'classic' },
  { id: 'pvp',      name: 'PvP ARENA',     wx: 1445,wy: 166, r: 80, mode: 'event'   },
];

let activeTrigger = null;
let debugMode     = false;

function checkTriggers() {
  activeTrigger = null;
  for (const t of TRIGGERS) {
    const dx = wx - t.wx;
    const dy = wy - t.wy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < t.r) {
      activeTrigger = t;
      break;
    }
  }

  const prompt = document.getElementById('enter-prompt');
  const bname  = document.getElementById('building-name');
  const btnE   = document.getElementById('btn-enter');

  if (activeTrigger) {
    prompt.style.display = 'block';
    prompt.textContent   = 'Press E — ' + activeTrigger.name;
    bname.textContent    = activeTrigger.name;
    if ('ontouchstart' in window) btnE.style.display = 'flex';
  } else {
    prompt.style.display = 'none';
    bname.textContent    = '';
    if ('ontouchstart' in window) btnE.style.display = 'none';
  }
}

function tryEnter() {
  if (!activeTrigger) return;
  sessionStorage.setItem('worldX', wx);
  sessionStorage.setItem('worldY', wy);
  if (activeTrigger.mode === 'classic') {
    window.location.href = 'dungeon.html';
  } else {
    window.location.href = 'game.html#event';
  }
}

// ── Pixel character renderer ──────────────────────────────
const SK = '#f0b878', SH = '#c88848';
const HA = '#402010';
const SH2= '#3878c8', ST = '#1858a8';
const PA = '#285878';
const SH3= '#281408';
const EY = '#202020', MO = '#c05050', WH2= '#ffffff';

function drawPixelChar(sx, sy, dir, fr, flip) {
  const sc = 3;
  ctx.save();
  if (flip) {
    ctx.translate(sx * 2 + 16 * sc, 0);
    ctx.scale(-1, 1);
  }

  function px(x, y, color) {
    if (!color) return;
    ctx.fillStyle = color;
    ctx.fillRect(sx + x * sc, sy + y * sc, sc, sc);
  }

  // Hair
  for (let i = 2; i < 14; i++) px(i, 0, HA);
  for (let i = 1; i < 15; i++) px(i, 1, (i >= 2 && i <= 13) ? HA : null);

  // Face
  for (let i = 2; i < 14; i++) px(i, 2, SK);
  for (let i = 2; i < 14; i++) px(i, 3, SK);
  if (dir !== 'up') {
    px(4, 3, EY); px(5, 3, WH2);
    px(10, 3, EY); px(11, 3, WH2);
  }
  for (let i = 2; i < 14; i++) px(i, 4, SK);
  if (dir === 'down') {
    px(5, 5, MO); px(8, 5, MO); px(10, 5, MO);
  }
  for (let i = 2; i < 14; i++) px(i, 5, SK);

  // Body
  for (let row = 6; row <= 9; row++)
    for (let i = 1; i < 15; i++) px(i, row, SH2);
  // Arms
  for (let row = 6; row <= 8; row++) {
    px(0, row, SH2); px(1, row, SH2);
    px(14, row, SH2); px(15, row, SH2);
  }
  px(0, 8, SK); px(1, 8, SK);
  px(14, 8, SK); px(15, 8, SK);

  // Legs
  const loff = (fr === 1) ? 2 : (fr === 3) ? -2 : 0;
  for (let row = 10; row <= 13; row++) {
    px(4, row, PA); px(5, row, PA);
  }
  for (let row = 10; row <= 13 + loff; row++) {
    px(9, row, PA); px(10, row, PA);
  }
  for (let row = 10; row <= 13 - loff; row++) {
    px(11, row, PA); px(12, row, PA);
  }

  // Shoes
  px(4, 14, SH3); px(5, 14, SH3); px(6, 14, SH3);
  px(9,  14 + loff, SH3); px(10, 14 + loff, SH3);
  px(11, 14 - loff, SH3); px(12, 14 - loff, SH3);

  ctx.restore();
}

// ── Debug draw ────────────────────────────────────────────
function drawDebug() {
  // Colliders - red
  ctx.lineWidth = 2;
  COLLIDERS.forEach(c => {
    ctx.strokeStyle = 'rgba(255,0,0,0.8)';
    ctx.fillStyle   = 'rgba(255,0,0,0.1)';
    const sx = c.x - camX, sy = c.y - camY;
    ctx.fillRect(sx, sy, c.w, c.h);
    ctx.strokeRect(sx, sy, c.w, c.h);
  });

  // Triggers - green circle
  TRIGGERS.forEach(t => {
    const sx = t.wx - camX;
    const sy = t.wy - camY;
    ctx.beginPath();
    ctx.arc(sx, sy, t.r, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,255,0,0.8)';
    ctx.fillStyle   = 'rgba(0,255,0,0.1)';
    ctx.fill();
    ctx.stroke();
    // Center dot
    ctx.beginPath();
    ctx.arc(sx, sy, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#00ff00';
    ctx.fill();
    // Label
    ctx.fillStyle = '#00ff00';
    ctx.font = 'bold 11px monospace';
    ctx.fillText(t.name, sx - 30, sy - t.r - 5);
  });

  // Char hitbox - yellow
  ctx.strokeStyle = 'rgba(255,255,0,0.9)';
  ctx.lineWidth   = 1;
  ctx.strokeRect(wx - camX - 14, wy - camY - 14, 28, 28);
}

// ── Draw image helper ─────────────────────────────────────
function drawImg(key, alpha) {
  const img = imgs[key];
  if (!img || !img.complete || !img.naturalWidth) return;
  ctx.globalAlpha = alpha || 1;
  ctx.drawImage(img, 0, 0, WW, WH);
  ctx.globalAlpha = 1;
}

// ── Main game loop ────────────────────────────────────────
function loop() {
  // Input
  let dx = 0, dy = 0;
  if (keys['a'] || keys['arrowleft'])  dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;
  if (keys['w'] || keys['arrowup'])    dy -= 1;
  if (keys['s'] || keys['arrowdown'])  dy += 1;
  dx += joy.dx;
  dy += joy.dy;
  if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  isMoving = (dx !== 0 || dy !== 0);

  // Facing direction
  if (Math.abs(dx) > Math.abs(dy)) {
    facing = dx > 0 ? 'right' : 'left';
  } else if (dy !== 0) {
    facing = dy > 0 ? 'down' : 'up';
  }

  // Move with collision
  const nx = wx + dx * SPEED;
  const ny = wy + dy * SPEED;
  if (canMove(nx, wy)) wx = nx;
  if (canMove(wx, ny)) wy = ny;

  // Animation
  if (isMoving) {
    animTick++;
    if (animTick >= ANIM_SPEED) {
      animTick = 0;
      animFrame = (animFrame + 1) % 4;
    }
  } else {
    animTick++;
    if (animTick >= 12) {
      animTick = 0;
      animFrame = (animFrame + 1) % 2;
    }
  }

  // Camera (AFTER moving)
  updateCamera();

  // Check triggers (uses wx, wy — world coords)
  checkTriggers();

  // ── Render ──
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background fill
  ctx.fillStyle = '#2a4a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // World space
  ctx.save();
  ctx.translate(-camX, -camY);

  drawImg('ground');
  drawImg('jalan');
  drawImg('danau');
  drawImg('shadow_dungeon',  0.5);
  drawImg('shadow_training', 0.5);
  drawImg('shadow_pvp',      0.5);
  drawImg('batu');
  drawImg('pohon');
  drawImg('dungeon');
  drawImg('pvp');

  const nearTraining = (wx > 684 && wx < 1158 && wy > 810 && wy < 1065);
  if (!nearTraining) drawSpriteChar(wx - 40, wy - 48);

  drawImg('training');

  if (nearTraining) drawSpriteChar(wx - 40, wy - 48);

  if (debugMode) drawDebug();

  ctx.restore();

  // HUD
  document.getElementById('debug-info').textContent =
    'wx:' + Math.floor(wx) + ' wy:' + Math.floor(wy) +
    ' | cam:' + Math.floor(camX) + ',' + Math.floor(camY) +
    (debugMode ? ' [DEBUG]' : ' [1=debug]');

  requestAnimationFrame(loop);
}

// ── Init ──────────────────────────────────────────────────
const sx = sessionStorage.getItem('worldX');
const sy = sessionStorage.getItem('worldY');
if (sx && sy) { wx = parseFloat(sx); wy = parseFloat(sy); }

setupJoystick();
requestAnimationFrame(loop);
</script>

  <canvas id="wallet-icon-canvas" width="40" height="40" style="image-rendering:pixelated;display:block"></canvas>

<!-- WALLET PANEL -->
<div id="wallet-panel" style="
  position:fixed;top:calc(45% + 50px);right:12px;z-index:998;
  background:rgba(4,4,20,0.97);
  border:2px solid #f0c040;
  box-shadow:0 0 20px rgba(240,192,64,0.3);
  padding:16px;width:220px;
  display:none;
  font-family:'Press Start 2P',monospace;
">
  <div style="font-size:7px;color:#f0c040;margin-bottom:12px;border-bottom:1px solid rgba(240,192,64,0.3);padding-bottom:8px;letter-spacing:1px">
    ── WALLET ──
  </div>
  <!-- Address -->
  <div style="font-size:6px;color:#6060a0;margin-bottom:4px">ADDRESS</div>

  <!-- Balance -->
  <div style="font-size:6px;color:#6060a0;margin-bottom:4px">BALANCE</div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;background:rgba(0,0,0,0.3);padding:8px;border:1px solid rgba(240,192,64,0.2)">
    <span style="font-size:18px">⚡</span>
    <div>
      <div id="wp-balance" style="font-size:9px;color:#f0c040">Loading...</div>
      <div style="font-family:'VT323',monospace;font-size:13px;color:#6060a0">RITUAL Token</div>
    </div>
  </div>
  <!-- Network -->
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:14px;font-family:'VT323',monospace;font-size:14px;color:#40c040">
    <div style="width:8px;height:8px;border-radius:50%;background:#40c040;flex-shrink:0"></div>
    Ritual Testnet
  </div>
  <!-- Disconnect -->
  <button onclick="disconnectFromWorld()" style="
    width:100%;padding:9px;
    background:rgba(80,10,10,0.8);
    border:2px solid rgba(200,50,50,0.6);
    color:#ff8080;font-size:7px;cursor:pointer;
    font-family:'Press Start 2P',monospace;
    transition:all 0.1s;
  " onmouseover="this.style.background='rgba(120,10,10,0.9)'" onmouseout="this.style.background='rgba(80,10,10,0.8)'">
    ⏻ DISCONNECT
  </button>
</div>

<script>
// ── Wallet Panel ──────────────────────────────────────────
let walletPanelOpen = false;

function toggleWalletPanel() {
  walletPanelOpen = !walletPanelOpen;
  const panel = document.getElementById('wallet-panel');
  panel.style.display = walletPanelOpen ? 'block' : 'none';
  if (walletPanelOpen) loadWalletInfo();
}

// Close panel when clicking outside
document.addEventListener('click', (e) => {
  const panel  = document.getElementById('wallet-panel');
  const btn    = document.getElementById('wallet-btn-wrap');
  if (!panel.contains(e.target) && !btn.contains(e.target)) {
    panel.style.display = 'none';
    walletPanelOpen = false;
  }
});

async function loadWalletInfo() {
  const addr = sessionStorage.getItem('wallet_address') || '—';
  const isDemo = sessionStorage.getItem('wallet_demo') === '1';

  // Address
  const addrEl = document.getElementById('wp-address');
  if (addr && addr !== '—') {
    addrEl.textContent = addr.slice(0,8) + '...' + addr.slice(-6);
    addrEl.title = addr;
  } else {
    addrEl.textContent = isDemo ? '0xDEMO (Demo Mode)' : '—';
  }

  // Balance
  const balEl = document.getElementById('wp-balance');
  if (isDemo) {
    balEl.textContent = 'Demo Mode';
    return;
  }
  if (!window.ethereum || !addr || addr === '—') {
    balEl.textContent = '—';
    return;
  }
  try {
    balEl.textContent = 'Loading...';
    const balance = await window.ethereum.request({
      method: 'eth_getBalance',
      params: [addr, 'latest'],
    });
    const eth = parseInt(balance, 16) / 1e18;
    balEl.textContent = eth.toFixed(4) + ' RITUAL';
  } catch(e) {
    balEl.textContent = 'Error loading';
  }
}

function disconnectFromWorld() {
  // Clear session
  sessionStorage.removeItem('wallet_connected');
  sessionStorage.removeItem('wallet_address');
  sessionStorage.removeItem('wallet_demo');
  sessionStorage.removeItem('wallet_type');
  sessionStorage.removeItem('worldX');
  sessionStorage.removeItem('worldY');

  // Revoke permissions if possible
  if (window.ethereum) {
    try {
      window.ethereum.request({
        method: 'wallet_revokePermissions',
        params: [{ eth_accounts: {} }]
      });
    } catch(e) {}
  }

  // Redirect to connect screen
  window.location.href = 'index.html';
}

// Draw wallet icon on canvas using loaded image
function drawWalletIcon() {
  const c   = document.getElementById('wallet-icon-canvas');
  const ctx = c.getContext('2d');
  const img = imgs['wallet_icon'];
  if (img && img.complete && img.naturalWidth) {
    ctx.clearRect(0, 0, 40, 40);
    ctx.drawImage(img, 0, 0, 40, 40);
  } else {
    // Fallback emoji
    ctx.font = '28px serif';
    ctx.fillText('👛', 2, 30);
  }
  // Redraw until loaded
  if (!img || !img.complete) setTimeout(drawWalletIcon, 200);
}

// Init wallet panel
window.addEventListener('load', () => {
  setTimeout(drawWalletIcon, 500);
});
</script>

<!-- NFT ICON -->
<div id="nft-btn-wrap" style="position:fixed;top:calc(45% + 60px);right:12px;z-index:999;cursor:pointer" onclick="toggleNFTPanel()">
  <img src="assets/nft_icon.png" style="width:40px;height:40px;image-rendering:pixelated;border:2px solid rgba(168,85,247,0.6);box-shadow:0 0 10px rgba(168,85,247,0.3)">
</div>

<!-- NFT PANEL -->
<div id="nft-panel" style="
  position:fixed;top:45%;right:60px;transform:translateY(-50%);z-index:998;
  background:rgba(4,4,20,0.75);
  backdrop-filter:blur(10px);
  border:2px solid rgba(168,85,247,0.5);
  box-shadow:0 0 20px rgba(168,85,247,0.2);
  padding:16px;width:240px;
  display:none;
  font-family:'Press Start 2P',monospace;
">
  <!-- No NFT view -->
  <div id="nft-create-view">
    <div style="font-size:7px;color:#a855f7;margin-bottom:12px;border-bottom:1px solid rgba(168,85,247,0.3);padding-bottom:8px">
      ── CREATE NFT ──
    </div>
    <div style="font-family:'VT323',monospace;font-size:13px;color:#6060a0;margin-bottom:10px;line-height:1.5">
      Mint your X profile as an NFT character to access PvP Arena!
    </div>
    <div style="font-size:6px;color:#6060a0;margin-bottom:4px">X USERNAME</div>
    <div style="display:flex;gap:6px;margin-bottom:8px;align-items:center">
      <img id="nft-input-avatar" src="" style="width:36px;height:36px;border-radius:50%;border:1px solid rgba(168,85,247,0.5);object-fit:cover;display:none;flex-shrink:0">
      <input id="nft-username-input" placeholder="your_username" style="
        flex:1;background:rgba(5,5,16,0.8);border:1px solid #3030a0;
        color:#40d0ff;padding:6px 8px;
        font-family:'Press Start 2P',monospace;font-size:7px;outline:none;
      " oninput="previewXAvatar(this.value)">
    </div>
    <button onclick="generateNFTStats()" id="btn-gen-nft" style="
      width:100%;padding:8px;margin-bottom:6px;
      background:rgba(168,85,247,0.2);
      border:2px solid rgba(168,85,247,0.6);
      color:#a855f7;font-size:7px;cursor:pointer;
      font-family:'Press Start 2P',monospace;
    ">⚡ Generate Stats</button>

    <!-- Preview stats -->
    <div id="nft-stats-preview" style="display:none;background:rgba(0,0,0,0.4);border:1px solid rgba(168,85,247,0.3);padding:10px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <img id="nft-preview-avatar" src="" style="width:40px;height:40px;border-radius:4px;border:1px solid #a855f7;object-fit:cover" onerror="this.style.display='none'">
        <div>
          <div id="nft-preview-name" style="font-size:6px;color:#a855f7;margin-bottom:2px">—</div>
          <div id="nft-preview-cls" style="font-family:'VT323',monospace;font-size:12px;color:#6060a0">—</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
        <div style="font-family:'VT323',monospace;font-size:12px;color:#6060a0">HP <span id="nft-prev-hp" style="color:#40ff80">—</span></div>
        <div style="font-family:'VT323',monospace;font-size:12px;color:#6060a0">ATK <span id="nft-prev-atk" style="color:#ff8040">—</span></div>
        <div style="font-family:'VT323',monospace;font-size:12px;color:#6060a0">DEF <span id="nft-prev-def" style="color:#4080ff">—</span></div>
        <div style="font-family:'VT323',monospace;font-size:12px;color:#6060a0">MP <span id="nft-prev-mp" style="color:#a040ff">—</span></div>
      </div>
    </div>

    <div id="nft-gen-status" style="font-family:'VT323',monospace;font-size:13px;color:#8080b0;min-height:16px;margin-bottom:6px;text-align:center"></div>

    <button onclick="mintNFT()" id="btn-mint-nft" style="
      width:100%;padding:8px;display:none;
      background:linear-gradient(135deg,rgba(168,85,247,0.3),rgba(124,58,237,0.3));
      border:2px solid #a855f7;
      color:#fff;font-size:7px;cursor:pointer;
      font-family:'Press Start 2P',monospace;
    ">🎖️ Mint NFT</button>
  </div>

  <!-- Has NFT view -->
  <div id="nft-detail-view" style="display:none">
    <div style="font-size:7px;color:#a855f7;margin-bottom:12px;border-bottom:1px solid rgba(168,85,247,0.3);padding-bottom:8px">
      ── MY NFT ──
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <img id="nft-detail-avatar" src="" style="width:52px;height:52px;border-radius:6px;border:2px solid #a855f7;object-fit:cover" onerror="this.style.display='none'">
      <div>
        <div id="nft-detail-name" style="font-size:6px;color:#a855f7;margin-bottom:2px">—</div>
        <div id="nft-detail-username" style="font-family:'VT323',monospace;font-size:12px;color:#6060a0">—</div>
        <div style="font-size:5px;background:#a855f7;color:#fff;padding:1px 5px;display:inline-block;margin-top:2px">NFT ✓</div>
      </div>
    </div>
    <div style="background:rgba(0,0,0,0.4);border:1px solid rgba(168,85,247,0.2);padding:8px;margin-bottom:10px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">
        <div style="font-family:'VT323',monospace;font-size:13px;color:#6060a0">HP <span id="nft-det-hp" style="color:#40ff80">—</span></div>
        <div style="font-family:'VT323',monospace;font-size:13px;color:#6060a0">ATK <span id="nft-det-atk" style="color:#ff8040">—</span></div>
        <div style="font-family:'VT323',monospace;font-size:13px;color:#6060a0">DEF <span id="nft-det-def" style="color:#4080ff">—</span></div>
        <div style="font-family:'VT323',monospace;font-size:13px;color:#6060a0">MP <span id="nft-det-mp" style="color:#a040ff">—</span></div>
      </div>
    </div>
    <div id="nft-detail-status" style="font-family:'VT323',monospace;font-size:13px;color:#8080b0;min-height:16px;margin-bottom:6px;text-align:center"></div>
    <button onclick="burnNFT()" style="
      width:100%;padding:8px;
      background:rgba(120,0,120,0.3);
      border:2px solid rgba(180,0,180,0.5);
      color:#ff80ff;font-size:7px;cursor:pointer;
      font-family:'Press Start 2P',monospace;
    ">🔥 Burn NFT</button>
  </div>
</div>

<script>
// ── NFT Contract ──────────────────────────────────────────
const NFT_CONTRACT = '0x592d75AC5aB1B04cA4109FBa9f08A69fDc2D566C';
const NFT_ABI = [
  'function mintCharacter(string username, string avatarUrl, string charName, string cls, string lore, uint16 hp, uint16 atk, uint16 def, uint16 mp, uint16 healPow) external',
  'function hasCharacter(address wallet) external view returns (bool)',
  'function usernameTaken(string username) external view returns (bool)',
  'function getCharacterByWallet(address wallet) external view returns (tuple(string username, string avatarUrl, string charName, string cls, string lore, uint16 hp, uint16 atk, uint16 def, uint16 mp, uint16 healPow, uint256 mintedAt, address owner))',
  'function burnCharacter() external',
];

const BACKEND_URL = 'https://ritualarena1.vercel.app';
let generatedNFT = null;
let nftPanelOpen = false;

// ── Toggle Panel ──────────────────────────────────────────
function toggleNFTPanel() {
  nftPanelOpen = !nftPanelOpen;
  const panel = document.getElementById('nft-panel');
  panel.style.display = nftPanelOpen ? 'block' : 'none';
  if (nftPanelOpen) checkNFTStatus();
}

// Close on outside click
document.addEventListener('click', (e) => {
  const panel = document.getElementById('nft-panel');
  const btn   = document.getElementById('nft-btn-wrap');
  if (!panel.contains(e.target) && !btn.contains(e.target)) {
    panel.style.display = 'none';
    nftPanelOpen = false;
  }
});

// ── Check NFT Status ──────────────────────────────────────
async function checkNFTStatus() {
  const addr = sessionStorage.getItem('wallet_address');
  const isDemo = sessionStorage.getItem('wallet_demo') === '1';
  if (!addr || isDemo) { showCreateView(); return; }

  try {
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const contract = new ethers.Contract(NFT_CONTRACT, NFT_ABI, provider);
    const has = await contract.hasCharacter(addr);
    if (has) {
      const data = await contract.getCharacterByWallet(addr);
      showDetailView(data);
    } else {
      showCreateView();
    }
  } catch(e) {
    showCreateView();
  }
}

function showCreateView() {
  document.getElementById('nft-create-view').style.display = 'block';
  document.getElementById('nft-detail-view').style.display = 'none';
}

function showDetailView(data) {
  document.getElementById('nft-create-view').style.display = 'none';
  document.getElementById('nft-detail-view').style.display = 'block';
  const username = data.username || '';
  const avatarUrl = data.avatarUrl || ('https://unavatar.io/x/' + username);
  const avatarEl = document.getElementById('nft-detail-avatar');
  avatarEl.src = avatarUrl;
  avatarEl.style.display = 'block';
  avatarEl.onerror = () => { avatarEl.style.display='none'; };
  document.getElementById('nft-detail-name').textContent = data.charName || data.username;
  document.getElementById('nft-detail-username').textContent = '@' + data.username;
  document.getElementById('nft-det-hp').textContent  = Number(data.hp);
  document.getElementById('nft-det-atk').textContent = Number(data.atk);
  document.getElementById('nft-det-def').textContent = Number(data.def);
  document.getElementById('nft-det-mp').textContent  = Number(data.mp);
  // Save to session for PvP
  sessionStorage.setItem('nft_data', JSON.stringify({
    username: data.username, avatarUrl: data.avatarUrl,
    charName: data.charName, cls: data.cls,
    hp: Number(data.hp), atk: Number(data.atk),
    def: Number(data.def), mp: Number(data.mp),
    healPow: Number(data.healPow),
  }));
}

// ── Generate Stats ────────────────────────────────────────
async function generateNFTStats() {
  const username = document.getElementById('nft-username-input').value.trim().replace('@','');
  if (!username) { alert('Enter your X username!'); return; }

  const btn = document.getElementById('btn-gen-nft');
  const status = document.getElementById('nft-gen-status');
  btn.disabled = true;
  btn.textContent = '⏳ Generating...';
  status.textContent = 'Generating your character...';
  document.getElementById('nft-stats-preview').style.display = 'none';
  document.getElementById('btn-mint-nft').style.display = 'none';
  generatedNFT = null;

  try {
    const res = await fetch(BACKEND_URL + '/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username }),
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Failed');
    const c = data.character;
    generatedNFT = c;

    document.getElementById('nft-preview-avatar').src = c.avatarUrl || '';
    document.getElementById('nft-preview-name').textContent = c.name || username;
    document.getElementById('nft-preview-cls').textContent  = c.cls  || 'Fighter';
    document.getElementById('nft-prev-hp').textContent  = c.hp;
    document.getElementById('nft-prev-atk').textContent = c.atk;
    document.getElementById('nft-prev-def').textContent = c.def;
    document.getElementById('nft-prev-mp').textContent  = c.mp;
    document.getElementById('nft-stats-preview').style.display = 'block';
    document.getElementById('btn-mint-nft').style.display = 'block';
    status.textContent = '✅ Stats generated!';
  } catch(e) {
    status.textContent = '❌ Failed: ' + (e.message || 'Unknown');
  }
  btn.disabled = false;
  btn.textContent = '⚡ Generate Stats';
}

// ── Mint NFT ──────────────────────────────────────────────
async function mintNFT() {
  if (!generatedNFT) return;
  const addr = sessionStorage.getItem('wallet_address');
  const isDemo = sessionStorage.getItem('wallet_demo') === '1';
  if (!addr || isDemo) { alert('Connect a real wallet first!'); return; }

  const btn    = document.getElementById('btn-mint-nft');
  const status = document.getElementById('nft-gen-status');
  btn.disabled = true;
  btn.textContent = '⏳ Minting...';
  status.textContent = 'Waiting for signature...';

  try {
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const signer   = provider.getSigner();
    const contract = new ethers.Contract(NFT_CONTRACT, NFT_ABI, signer);
    const c = generatedNFT;

    // Check username taken
    const taken = await contract.usernameTaken(c.username || document.getElementById('nft-username-input').value.trim());
    if (taken) { status.textContent = '❌ Username already minted!'; btn.disabled=false; btn.textContent='🎖️ Mint NFT'; return; }

    const tx = await contract.mintCharacter(
      c.username || document.getElementById('nft-username-input').value.trim(),
      c.avatarUrl || '',
      c.name || c.username,
      c.cls || 'Fighter',
      c.lore || '',
      c.hp, c.atk, c.def, c.mp, c.healPow || 20
    );
    status.textContent = '⏳ Confirming...';
    await tx.wait();
    status.textContent = '🎖️ NFT Minted!';
    btn.textContent = '✅ Minted!';
    setTimeout(() => checkNFTStatus(), 1000);
  } catch(e) {
    status.textContent = '❌ ' + (e.reason || e.message || 'Error');
    btn.disabled = false;
    btn.textContent = '🎖️ Mint NFT';
  }
}

// ── Burn NFT ──────────────────────────────────────────────
async function burnNFT() {
  if (!confirm('🔥 Burn your NFT? This cannot be undone!')) return;
  const status = document.getElementById('nft-detail-status');
  status.textContent = '⏳ Burning...';
  try {
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    const signer   = provider.getSigner();
    const contract = new ethers.Contract(NFT_CONTRACT, ['function burnCharacter() external'], signer);
    const tx = await contract.burnCharacter();
    await tx.wait();
    sessionStorage.removeItem('nft_data');
    status.textContent = '🔥 Burned!';
    setTimeout(() => showCreateView(), 1000);
  } catch(e) {
    status.textContent = '❌ ' + (e.reason || e.message || 'Error');
  }
}

// Preview X avatar from username
function previewXAvatar(username) {
  username = username.trim().replace('@','');
  const avatar = document.getElementById('nft-input-avatar');
  if (!username) { avatar.style.display='none'; return; }
  // Use unavatar service to get X profile pic
  avatar.src = 'https://unavatar.io/x/' + username;
  avatar.style.display = 'block';
  avatar.onerror = () => { avatar.style.display='none'; };
}

// Auto check NFT on load
window.addEventListener('load', () => {
  setTimeout(() => {
    const addr = sessionStorage.getItem('wallet_address');
    if (addr && sessionStorage.getItem('wallet_demo') !== '1') {
      checkNFTStatus();
    }
  }, 1500);
});
</script>
</body>
</html>

<script>
// Sprite sheet renderer patch
// Walk: 4 cols x 4 rows, 256x256 total -> frame 64x64
// Idle: 2 cols x 4 rows, 256x256 total -> frame 128x64
const WALK_FW = 64; const WALK_FH = 64;
const IDLE_FW = 64; const IDLE_FH = 64;
const DISPLAY_W = 80;
const DISPLAY_H = 80;
const DIR_ROW = { down:0, left:1, right:2, up:3 };

function drawSpriteChar(sx, sy) {
  const row = DIR_ROW[facing] ?? 0;
  if (isMoving) {
    const img = imgs['char_walk'];
    if (!img || !img.complete || !img.naturalWidth) return;
    const col = animFrame % 4;
    ctx.drawImage(img, col*WALK_FW, row*WALK_FH, WALK_FW, WALK_FH, sx, sy, DISPLAY_W, DISPLAY_H);
  } else {
    const img = imgs['char_idle'];
    if (!img || !img.complete || !img.naturalWidth) return;
    const col = animFrame % 2;
    ctx.drawImage(img, col*IDLE_FW, row*IDLE_FH, IDLE_FW, IDLE_FH, sx, sy, DISPLAY_W, DISPLAY_H);
  }
}
</script>
