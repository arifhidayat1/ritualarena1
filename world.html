<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ritual Arena — World</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Press Start 2P',monospace; }
#hud {
  position:fixed; top:0; left:0; right:0; z-index:999;
  background:rgba(0,0,0,0.7);
  border-bottom:1px solid #f0c040;
  padding:6px 14px;
  display:flex; align-items:center; gap:10px;
  font-size:7px; color:#f0c040;
}
#debug-info { margin-left:auto; color:#40d0ff; font-family:monospace; font-size:10px; }
#enter-prompt {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%, -80px);
  background:rgba(0,0,0,0.9);
  border:2px solid #f0c040;
  color:#f0c040; padding:8px 16px;
  font-size:8px; display:none; z-index:999;
}
canvas { display:block; }
#joystick-zone {
  position:fixed; bottom:30px; left:30px;
  width:120px; height:120px; z-index:999; display:none;
}
#joystick-base {
  width:120px; height:120px; border-radius:50%;
  background:rgba(255,255,255,0.1);
  border:2px solid rgba(255,255,255,0.3);
  position:absolute;
}
#joystick-stick {
  width:50px; height:50px; border-radius:50%;
  background:rgba(240,192,64,0.7);
  border:2px solid #f0c040;
  position:absolute; top:35px; left:35px;
}
#btn-enter {
  position:fixed; bottom:30px; right:30px;
  width:70px; height:70px; border-radius:50%;
  background:rgba(240,192,64,0.2);
  border:2px solid rgba(240,192,64,0.6);
  color:#f0c040; font-size:10px;
  display:none; z-index:999;
  align-items:center; justify-content:center;
  flex-direction:column; cursor:pointer;
  font-family:'Press Start 2P',monospace;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud">
  <span>RITUAL ARENA</span>
  <span style="color:#4040a0;font-size:7px">WORLD MAP</span>
  <span id="building-name" style="color:#80ff80;font-size:7px"></span>
  <span id="debug-info">x:0 y:0</span>
</div>

<div id="enter-prompt">Press E to Enter</div>
<canvas id="canvas"></canvas>

<div id="joystick-zone">
  <div id="joystick-base"></div>
  <div id="joystick-stick"></div>
</div>
<div id="btn-enter" onclick="tryEnter()">
  <span style="font-size:14px">E</span>
  <span style="font-size:6px">ENTER</span>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
});

const WW = 1920, WH = 1080;

// Load assets
const imgs = {};
const ASSETS = [
  ['ground',           'assets/ground.png'],
  ['jalan',            'assets/jalan.png'],
  ['danau',            'assets/danau.png'],
  ['batu',             'assets/batu.png'],
  ['pohon',            'assets/pohon.png'],
  ['shadow_dungeon',   'assets/bayangan_dungeon.png'],
  ['shadow_training',  'assets/bayangan_training.png'],
  ['shadow_pvp',       'assets/bayangan_pvp.png'],
  ['dungeon',          'assets/dungeon.png'],
  ['training',         'assets/training.png'],
  ['pvp',              'assets/pvp.png'],
];

ASSETS.forEach(([key, src]) => {
  const img = new Image();
  img.src = src;
  imgs[key] = img;
});

// Character state
let charX = 960, charY = 540;
const SPEED = 4;
let facing = 'down';
let moving = false;
let frame = 0, frameTick = 0;
const FRAME_SPEED = 8;

// Keyboard
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if(e.key.toLowerCase() === 'e') tryEnter();
  if(e.key === '1') { debugMode = !debugMode; }
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Joystick
const joy = { dx:0, dy:0 };
function setupJoystick() {
  if(!('ontouchstart' in window)) return;
  document.getElementById('joystick-zone').style.display = 'block';
  document.getElementById('btn-enter').style.display = 'flex';
  const zone  = document.getElementById('joystick-zone');
  const stick = document.getElementById('joystick-stick');
  let sx = 0, sy = 0;
  zone.addEventListener('touchstart', e => {
    const r = zone.getBoundingClientRect();
    sx = r.left + 60; sy = r.top + 60;
    e.preventDefault();
  }, {passive:false});
  zone.addEventListener('touchmove', e => {
    const t = e.touches[0];
    let dx = t.clientX - sx, dy = t.clientY - sy;
    const d = Math.sqrt(dx*dx + dy*dy);
    if(d > 35) { dx = dx/d*35; dy = dy/d*35; }
    joy.dx = dx/35; joy.dy = dy/35;
    stick.style.left = (35+dx) + 'px';
    stick.style.top  = (35+dy) + 'px';
    e.preventDefault();
  }, {passive:false});
  const end = () => {
    joy.dx = 0; joy.dy = 0;
    stick.style.left = '35px'; stick.style.top = '35px';
  };
  zone.addEventListener('touchend',    end);
  zone.addEventListener('touchcancel', end);
}

// Collision - hanya boundary world
const COLLIDERS = [
  { x:-50,  y:0,   w:50,  h:WH },
  { x:WW,   y:0,   w:50,  h:WH },
  { x:0,    y:-50, w:WW,  h:50 },
  { x:0,    y:WH,  w:WW,  h:50 },
];

// Trigger zones pintu bangunan
const TRIGGERS = [
  { id:'dungeon',  name:'DUNGEON',       x:570, y:190, w:200, h:70,  mode:'classic' },
  { id:'training', name:'TRAINING CAMP', x:560, y:500, w:180, h:70,  mode:'classic' },
  { id:'pvp',      name:'PvP ARENA',     x:1100,y:190, w:150, h:80,  mode:'event'   },
];

let activeTrigger = null;
let debugMode = false;

function rectHit(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function canMove(nx, ny) {
  for(const c of COLLIDERS) {
    if(rectHit(nx-16, ny-16, 32, 32, c.x, c.y, c.w, c.h)) return false;
  }
  return true;
}

// Draw pixel character on canvas
function drawChar(cx, cy, dir, fr, flip) {
  const sc = 3;
  const S = '#f0b878', H = '#402010', T = '#3878c8', P = '#285878', O = '#281408';
  const E = '#202020', R = '#c05050', W = '#ffffff';

  ctx.save();
  if(flip) {
    ctx.translate(cx * 2, 0);
    ctx.scale(-1, 1);
  }

  const px = (x, y, c) => {
    ctx.fillStyle = c;
    ctx.fillRect(cx + x*sc, cy + y*sc, sc, sc);
  };

  // Hair
  for(let i=2;i<14;i++) px(i,0,H);
  for(let i=0;i<16;i++) px(i,1,i>=2&&i<=13?H:null);

  // Head
  for(let i=2;i<14;i++) px(i,2,S);
  for(let i=2;i<14;i++) px(i,3,S);

  // Eyes (facing down/left)
  if(dir !== 'up') {
    px(4,3,E); px(5,3,W);
    px(10,3,E); px(11,3,W);
    if(dir==='down') { px(5,5,R); px(8,5,R); px(10,5,R); }
  }

  for(let i=2;i<14;i++) px(i,4,S);
  for(let i=2;i<14;i++) px(i,5,S);

  // Body
  for(let row=6;row<=9;row++)
    for(let i=1;i<15;i++) px(i,row,T);

  // Arms
  px(0,6,T); px(1,6,T); px(14,6,T); px(15,6,T);
  px(0,7,T); px(1,7,T); px(14,7,T); px(15,7,T);
  px(0,8,S); px(1,8,S); px(14,8,S); px(15,8,S);

  // Legs animation
  const loff = fr===1 ? 2 : fr===3 ? -2 : 0;
  for(let row=10;row<=13;row++) { px(4,row,P); px(5,row,P); }
  for(let row=10;row<=13+loff;row++) { px(9,row,P); px(10,row,P); }
  for(let row=10;row<=13-loff;row++) { px(11,row,P); px(12,row,P); }

  // Shoes
  px(4,14,O); px(5,14,O); px(6,14,O);
  px(9,14+loff,O); px(10,14+loff,O);
  px(11,14-loff,O); px(12,14-loff,O);

  ctx.restore();
}

// Camera
let camX = 0, camY = 0;
function updateCam() {
  camX = charX - canvas.width/2;
  camY = charY - canvas.height/2;
  camX = Math.max(0, Math.min(WW - canvas.width,  camX));
  camY = Math.max(0, Math.min(WH - canvas.height, camY));
}

// Check triggers
function checkTriggers() {
  activeTrigger = null;
  for(const t of TRIGGERS) {
    if(rectHit(charX-16, charY-16, 32, 32, t.x, t.y, t.w, t.h)) {
      activeTrigger = t; break;
    }
  }
  const pr = document.getElementById('enter-prompt');
  const bn = document.getElementById('building-name');
  if(activeTrigger) {
    pr.style.display = 'block';
    pr.textContent   = 'Press E — ' + activeTrigger.name;
    bn.textContent   = activeTrigger.name;
  } else {
    pr.style.display = 'none';
    bn.textContent   = '';
  }
}

function tryEnter() {
  if(!activeTrigger) return;
  sessionStorage.setItem('worldX', charX);
  sessionStorage.setItem('worldY', charY);
  if(activeTrigger.mode === 'classic') window.location.href = 'index.html#classic';
  else window.location.href = 'index.html#event';
}

// Draw debug boxes
function drawDebug() {
  COLLIDERS.forEach(c => {
    ctx.strokeStyle = 'rgba(255,0,0,0.8)';
    ctx.lineWidth = 2;
    ctx.strokeRect(c.x-camX, c.y-camY, c.w, c.h);
    ctx.fillStyle = 'rgba(255,0,0,0.15)';
    ctx.fillRect(c.x-camX, c.y-camY, c.w, c.h);
  });
  TRIGGERS.forEach(t => {
    ctx.strokeStyle = 'rgba(0,255,0,0.8)';
    ctx.lineWidth = 2;
    ctx.strokeRect(t.x-camX, t.y-camY, t.w, t.h);
    ctx.fillStyle = 'rgba(0,255,0,0.15)';
    ctx.fillRect(t.x-camX, t.y-camY, t.w, t.h);
    ctx.fillStyle = '#00ff00';
    ctx.font = 'bold 11px monospace';
    ctx.fillText(t.name, t.x-camX+4, t.y-camY+14);
  });
  // Char hitbox
  ctx.strokeStyle = 'rgba(255,255,0,0.8)';
  ctx.lineWidth = 1;
  ctx.strokeRect(charX-camX-16, charY-camY-16, 32, 32);
}

// Main loop
function loop() {
  let dx = 0, dy = 0;
  if(keys['a'] || keys['arrowleft'])  dx -= 1;
  if(keys['d'] || keys['arrowright']) dx += 1;
  if(keys['w'] || keys['arrowup'])    dy -= 1;
  if(keys['s'] || keys['arrowdown'])  dy += 1;
  dx += joy.dx; dy += joy.dy;
  if(dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }

  moving = dx !== 0 || dy !== 0;

  if(Math.abs(dx) > Math.abs(dy)) {
    facing = dx > 0 ? 'right' : 'left';
  } else if(dy !== 0) {
    facing = dy > 0 ? 'down' : 'up';
  }

  const nx = charX + dx * SPEED;
  const ny = charY + dy * SPEED;
  if(canMove(nx, charY)) charX = nx;
  if(canMove(charX, ny)) charY = ny;

  if(moving) {
    frameTick++;
    if(frameTick >= FRAME_SPEED) { frameTick = 0; frame = (frame+1) % 4; }
  } else {
    frame = 0; frameTick = 0;
  }

  updateCam();
  checkTriggers();

  // Clear
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#2a4a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(-camX, -camY);

  // Draw layers
  const draw = (key, alpha) => {
    const img = imgs[key];
    if(img && img.complete && img.naturalWidth > 0) {
      ctx.globalAlpha = alpha || 1;
      ctx.drawImage(img, 0, 0, WW, WH);
      ctx.globalAlpha = 1;
    }
  };

  draw('ground');
  draw('jalan');
  draw('danau');
  draw('shadow_dungeon',  0.5);
  draw('shadow_training', 0.5);
  draw('shadow_pvp',      0.5);
  draw('batu');
  draw('pohon');
  draw('dungeon');
  draw('training');
  draw('pvp');

  if(debugMode) drawDebug();

  // Draw character
  const flip = facing === 'right';
  const dir  = flip ? 'left' : facing;
  drawChar(charX - 24, charY - 24, dir, frame, flip);

  ctx.restore();

  // Update HUD
  document.getElementById('debug-info').textContent =
    'x:' + Math.floor(charX) + ' y:' + Math.floor(charY) +
    (debugMode ? ' [DEBUG ON - press 1 to toggle]' : ' [press 1 for debug]');

  requestAnimationFrame(loop);
}

// Restore position from game
const sx = sessionStorage.getItem('worldX');
const sy = sessionStorage.getItem('worldY');
if(sx && sy) { charX = parseFloat(sx); charY = parseFloat(sy); }

setupJoystick();
requestAnimationFrame(loop);
</script>
</body>
</html>
