<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritual Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'Press Start 2P',monospace; }

/* ── Animated world background ── */
#bg {
  position:fixed; inset:0; z-index:0;
  background:
    url('assets/ground.png') center/cover no-repeat,
    #2a4a1a;
  filter:blur(4px) brightness(0.45);
  transform:scale(1.08);
}
#bg-road  { position:fixed; inset:0; z-index:1; background:url('assets/jalan.png')  center/cover no-repeat; filter:blur(4px) brightness(0.45); transform:scale(1.08); }
#bg-tree  { position:fixed; inset:0; z-index:2; background:url('assets/pohon.png')  center/cover no-repeat; filter:blur(4px) brightness(0.45); transform:scale(1.08); }
#bg-build { position:fixed; inset:0; z-index:3; background:url('assets/dungeon.png') center/cover no-repeat; filter:blur(4px) brightness(0.3); transform:scale(1.08); }

/* Floating particles */
.particle {
  position:fixed; border-radius:50%;
  background:radial-gradient(circle, rgba(240,192,64,0.6), transparent);
  animation:float linear infinite;
  pointer-events:none; z-index:4;
}
@keyframes float {
  0%   { transform:translateY(110vh) scale(0); opacity:0; }
  10%  { opacity:1; }
  90%  { opacity:0.6; }
  100% { transform:translateY(-10vh) scale(1); opacity:0; }
}

/* Dark overlay */
#overlay { position:fixed; inset:0; z-index:5; background:rgba(0,0,15,0.5); }

/* Scanline */
#scanline {
  position:fixed; inset:0; z-index:6; pointer-events:none;
  background:repeating-linear-gradient(0deg,
    rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px,
    transparent 1px, transparent 4px);
}

/* ── Connect panel ── */
#panel {
  position:fixed; inset:0; z-index:10;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:20px;
}

.title {
  font-size:clamp(14px,4vw,30px);
  color:#f0c040;
  text-shadow:0 0 30px rgba(240,192,64,0.9), 3px 3px 0 #000;
  letter-spacing:3px; text-align:center; margin-bottom:6px;
  animation:titlePulse 3s ease-in-out infinite alternate;
}
@keyframes titlePulse {
  from { text-shadow:0 0 20px rgba(240,192,64,0.6), 3px 3px 0 #000; }
  to   { text-shadow:0 0 50px #f0c040, 0 0 80px rgba(240,160,0,0.6), 3px 3px 0 #000; }
}
.subtitle {
  font-family:'VT323',monospace; font-size:18px;
  color:#80b0d0; text-align:center;
  letter-spacing:3px; margin-bottom:28px;
}

.box {
  width:100%; max-width:350px;
  background:rgba(4,4,20,0.93);
  border:2px solid #f0c040;
  box-shadow:0 0 0 1px #000, 0 0 40px rgba(240,192,64,0.2),
             inset 0 0 30px rgba(30,30,80,0.6);
  padding:22px;
}
.box-title {
  font-size:8px; color:#f0c040; text-align:center;
  border-bottom:1px solid rgba(240,192,64,0.3);
  padding-bottom:12px; margin-bottom:16px;
  letter-spacing:1px;
}

.w-btn {
  display:flex; align-items:center; gap:12px;
  width:100%; padding:11px 14px; margin-bottom:9px;
  background:rgba(15,15,50,0.8);
  border:2px solid rgba(70,70,160,0.5);
  color:#e0d8ff; cursor:pointer;
  font-family:'Press Start 2P',monospace;
  font-size:7px; transition:all 0.12s;
}
.w-btn:hover:not(:disabled) {
  border-color:#f0c040; background:rgba(35,35,90,0.9);
  transform:translateX(3px);
  box-shadow:0 0 12px rgba(240,192,64,0.2);
}
.w-btn:active:not(:disabled) { transform:scale(0.98); }
.w-btn:disabled { opacity:0.35; cursor:not-allowed; }
.wico {
  width:34px; height:34px; border-radius:4px;
  display:flex; align-items:center; justify-content:center;
  font-size:20px; flex-shrink:0;
}
.wname { font-size:8px; color:#f0c040; }
.wsub  { font-family:'VT323',monospace; font-size:13px; color:#505080; margin-top:2px; }

.divider {
  display:flex; align-items:center; gap:8px;
  color:#333; font-family:'VT323',monospace;
  font-size:14px; margin:4px 0;
}
.divider::before, .divider::after {
  content:''; flex:1; height:1px; background:rgba(255,255,255,0.08);
}

#status {
  font-family:'VT323',monospace; font-size:15px;
  color:#80c0ff; text-align:center;
  min-height:22px; margin-top:12px; line-height:1.5;
}

/* ── Smoke transition ── */
#smoke {
  position:fixed; inset:0; z-index:200;
  pointer-events:none; display:none;
}
.sp {
  position:absolute; border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,255,255,0.96) 0%,
    rgba(230,230,230,0.7) 40%,
    transparent 70%);
  animation:smokeUp linear forwards;
}
@keyframes smokeUp {
  0%   { transform:translateY(0) scale(0.2); opacity:0; }
  15%  { opacity:1; }
  80%  { opacity:0.85; }
  100% { transform:translateY(-130vh) scale(4); opacity:0; }
}
#smoke-white {
  position:fixed; inset:0; z-index:201;
  background:#fff; opacity:0; pointer-events:none;
  transition:opacity 0.35s;
}

/* Spinner */
.sp2 {
  display:inline-block; width:10px; height:10px;
  border:2px solid rgba(255,255,255,0.2);
  border-top-color:#f0c040; border-radius:50%;
  animation:spin 0.7s linear infinite;
  vertical-align:middle; margin-right:6px;
}
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

<!-- Layered blurred world background -->
<div id="bg"></div>
<div id="bg-road"></div>
<div id="bg-tree"></div>
<div id="bg-build"></div>
<div id="overlay"></div>
<div id="scanline"></div>

<!-- Floating gold particles -->
<div id="particles"></div>

<!-- Connect panel -->
<div id="panel">
  <div class="title">⚔ RITUAL ARENA</div>
  <div class="subtitle">Turn-Based Battle · Ritual Testnet</div>

  <div class="box">
    <div class="box-title">— CONNECT WALLET —</div>

    <button class="w-btn" id="btn-mm" onclick="connectMM()">
      <div class="wico" style="background:rgba(246,133,27,0.15);border:1px solid rgba(246,133,27,0.4)">🦊</div>
      <div><div class="wname">MetaMask</div><div class="wsub">Browser extension</div></div>
    </button>

    <button class="w-btn" id="btn-rabby" onclick="connectRabby()">
      <div class="wico" style="background:rgba(134,151,255,0.15);border:1px solid rgba(134,151,255,0.4)">🐰</div>
      <div><div class="wname">Rabby Wallet</div><div class="wsub">Multi-chain friendly</div></div>
    </button>

    <div class="divider">or</div>

    <button class="w-btn" onclick="connectDemo()" style="border-color:rgba(240,192,64,0.3)">
      <div class="wico" style="background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,0.3)">🎮</div>
      <div><div class="wname" style="color:#b09020">Demo Mode</div><div class="wsub">No wallet needed</div></div>
    </button>

    <div id="status"></div>
  </div>
</div>

<!-- Smoke transition -->
<div id="smoke"></div>
<div id="smoke-white"></div>

<script>
// ── Particles ─────────────────────────────────────────────
(function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p  = document.createElement('div');
    p.className = 'particle';
    const sz = 4 + Math.random() * 12;
    p.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${Math.random()*100}vw;
      animation-duration:${6+Math.random()*10}s;
      animation-delay:${Math.random()*8}s;
      filter:blur(${Math.random()*2}px);
    `;
    container.appendChild(p);
  }
})();

// ── Chain ─────────────────────────────────────────────────
const CHAIN_ID = '0x7BB';
const CHAIN_PARAMS = {
  chainId: CHAIN_ID,
  chainName: 'Ritual Testnet',
  nativeCurrency: { name:'RITUAL', symbol:'RITUAL', decimals:18 },
  rpcUrls: ['https://rpc.ritualfoundation.org'],
  blockExplorerUrls: ['https://explorer.ritualfoundation.org'],
};

// ── Auto reconnect on load ────────────────────────────────
window.addEventListener('load', async () => {
  if (sessionStorage.getItem('wallet_connected') === '1') {
    if (window.ethereum) {
      try {
        const accounts = await window.ethereum.request({ method:'eth_accounts' });
        if (accounts && accounts.length > 0) {
          setStatus('✅ Reconnecting...');
          setTimeout(() => smokeAndGo(), 600);
          return;
        }
      } catch(e) {}
    }
    // Demo mode
    if (sessionStorage.getItem('wallet_demo') === '1') {
      setStatus('🎮 Resuming demo...');
      setTimeout(() => smokeAndGo(), 600);
      return;
    }
    // Clear stale session
    sessionStorage.removeItem('wallet_connected');
  }
});

// ── Helpers ───────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function setLoading(id, on, label) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = on;
  btn.querySelector('.wname').innerHTML = on
    ? '<span class="sp2"></span>Connecting...'
    : label;
}

function getProvider(rabby = false) {
  const providers = window.ethereum?.providers || [];
  if (providers.length) {
    if (rabby) {
      const r = providers.find(p => p.isRabby);
      if (r) return r;
    } else {
      const m = providers.find(p => p.isMetaMask && !p.isRabby);
      if (m) return m;
    }
    return providers[0];
  }
  if (rabby && window.rabby) return window.rabby;
  return window.ethereum || null;
}

async function doConnect(provider, btnId, label) {
  setLoading(btnId, true, label);
  try {
    await provider.request({
      method: 'wallet_requestPermissions',
      params: [{ eth_accounts: {} }],
    });
    const accounts = await provider.request({ method: 'eth_accounts' });
    if (!accounts?.length) {
      setStatus('❌ No account selected');
      setLoading(btnId, false, label);
      return;
    }
    // Check/switch chain
    const chainId = await provider.request({ method: 'eth_chainId' });
    if (chainId.toLowerCase() !== CHAIN_ID.toLowerCase()) {
      setStatus('⏳ Switching to Ritual Testnet...');
      try {
        await provider.request({
          method: 'wallet_switchEthereumChain',
          params: [{ chainId: CHAIN_ID }],
        });
      } catch (sw) {
        if (sw.code === 4902) {
          await provider.request({
            method: 'wallet_addEthereumChain',
            params: [CHAIN_PARAMS],
          });
        } else throw sw;
      }
    }
    sessionStorage.setItem('wallet_connected', '1');
    sessionStorage.setItem('wallet_address',   accounts[0]);
    sessionStorage.removeItem('wallet_demo');
    setStatus('✅ Connected! Entering world...');
    setLoading(btnId, false, label);
    setTimeout(() => smokeAndGo(), 500);
  } catch (e) {
    setLoading(btnId, false, label);
    if (e.code === 4001) setStatus('❌ Rejected by user');
    else setStatus('❌ ' + (e.message || 'Unknown error'));
  }
}

async function connectMM() {
  const p = getProvider(false);
  if (!p) {
    setStatus('❌ MetaMask not found!');
    setTimeout(() => window.open('https://metamask.io/download/', '_blank'), 1000);
    return;
  }
  await doConnect(p, 'btn-mm', 'MetaMask');
}

async function connectRabby() {
  const p = getProvider(true);
  if (!p) {
    setStatus('❌ Rabby not found!');
    setTimeout(() => window.open('https://rabby.io/', '_blank'), 1000);
    return;
  }
  await doConnect(p, 'btn-rabby', 'Rabby Wallet');
}

function connectDemo() {
  sessionStorage.setItem('wallet_connected', '1');
  sessionStorage.setItem('wallet_demo', '1');
  sessionStorage.setItem('wallet_address',
    '0xDEMO' + Math.random().toString(16).slice(2,10).toUpperCase());
  setStatus('🎮 Demo mode — Entering world...');
  setTimeout(() => smokeAndGo(), 400);
}

// ── Smoke transition ──────────────────────────────────────
function smokeAndGo() {
  const smoke = document.getElementById('smoke');
  const white = document.getElementById('smoke-white');
  smoke.style.display = 'block';
  smoke.innerHTML = '';

  // Spawn smoke particles from bottom
  for (let i = 0; i < 35; i++) {
    const p   = document.createElement('div');
    p.className = 'sp';
    const sz  = 100 + Math.random() * 220;
    const x   = Math.random() * 110 - 5;
    const y   = 50 + Math.random() * 60;
    const dur = 1.0 + Math.random() * 0.7;
    const del = Math.random() * 0.5;
    p.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${x}vw; top:${y}vh;
      animation-duration:${dur}s;
      animation-delay:${del}s;
      filter:blur(${6+Math.random()*10}px);
    `;
    smoke.appendChild(p);
  }

  // White flash
  setTimeout(() => { white.style.opacity = '1'; }, 950);

  // Navigate
  setTimeout(() => { window.location.href = 'world.html'; }, 1350);
}
</script>
</body>
</html>
